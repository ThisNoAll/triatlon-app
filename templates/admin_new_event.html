
{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-4">
        <h1 class="h3 mb-4">Új esemény létrehozása</h1>
        <form method="post" class="d-grid gap-3">
          <div>
            <label class="form-label">Esemény neve</label>
            <input class="form-control form-control-lg" type="text" name="title" required>
          </div>
          <div>
            <label class="form-label">Kezdés időpontja</label>
            <input class="form-control form-control-lg" type="datetime-local" name="start_at" required>
          </div>
          <div class="small text-muted">
            A jelentkezés automatikusan a kezdés előtt 6 órával zárul.
          </div>
          <button class="btn btn-dark btn-lg">Esemény létrehozása</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
